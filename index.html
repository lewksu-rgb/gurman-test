<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>насколько ты гурман? 🖤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --gold:#C9A84C;
    --gold-soft:rgba(201,168,76,0.15);
    --text:#ffffff;
    --muted:#888888;
    --btn-bg:#1a1a1a;
    --btn-hover:#2a2a2a;
    --radius:12px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    overscroll-behavior:none;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px 16px;
  }

  h1,h2,h3, .serif{
    font-family:'Cormorant Garamond', serif;
  }

  .app{
    width:100%;
    max-width:480px;
    margin:0 auto;
    position:relative;
    min-height:560px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .screen{
    width:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    animation:fadeIn 0.35s ease;
  }

  .screen.active{ display:flex; }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @keyframes fadeOut{
    from{ opacity:1; transform:translateY(0); }
    to{ opacity:0; transform:translateY(-10px); }
  }

  .screen.leaving{
    animation:fadeOut 0.25s ease forwards;
  }

  /* ---------- welcome ---------- */
  .welcome-emoji{
    font-size:56px;
    margin-bottom:8px;
  }

  .welcome-title{
    font-size:42px;
    font-weight:700;
    color:var(--gold);
    line-height:1.15;
    margin:0 0 18px;
    text-transform:lowercase;
    letter-spacing:0.5px;
  }

  .welcome-sub{
    font-size:17px;
    color:var(--text);
    line-height:1.5;
    margin:0 0 6px;
  }

  .welcome-meta{
    font-size:15px;
    color:var(--muted);
    margin:0 0 36px;
  }

  .btn{
    border:none;
    border-radius:var(--radius);
    padding:16px 28px;
    font-family:'Inter', sans-serif;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    width:100%;
    transition:transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    text-transform:lowercase;
  }

  .btn:active{ transform:scale(0.97); }

  .btn-gold{
    background:var(--gold);
    color:#0a0a0a;
  }

  .btn-gold:hover{
    background:#d9b95c;
  }

  .btn-outline{
    background:transparent;
    color:var(--gold);
    border:1.5px solid var(--gold);
  }

  .btn-outline:hover{
    background:var(--gold-soft);
  }

  .btn-ghost{
    background:transparent;
    color:var(--muted);
    text-decoration:underline;
    padding:12px 0;
  }

  .btn-stack{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
    margin-top:28px;
  }

  /* ---------- quiz ---------- */
  .quiz-wrap{
    width:100%;
  }

  .progress-track{
    width:100%;
    height:6px;
    background:#1e1e1e;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:10px;
  }

  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, #a9843a, var(--gold));
    border-radius:999px;
    width:0%;
    transition:width 0.4s ease;
  }

  .progress-label{
    font-size:13px;
    color:var(--muted);
    margin-bottom:28px;
    letter-spacing:0.5px;
  }

  .q-number{
    font-family:'Cormorant Garamond', serif;
    font-size:22px;
    color:var(--gold);
    font-weight:600;
    margin-bottom:10px;
  }

  .q-text{
    font-size:24px;
    font-weight:600;
    line-height:1.35;
    margin-bottom:28px;
    text-align:left;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
  }

  .option{
    background:var(--btn-bg);
    color:var(--text);
    border:1.5px solid transparent;
    border-radius:var(--radius);
    padding:16px 18px;
    font-family:'Inter', sans-serif;
    font-size:15.5px;
    text-align:left;
    line-height:1.4;
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }

  .option:hover{
    background:var(--btn-hover);
  }

  .option:active{
    transform:scale(0.98);
  }

  .option.selected{
    border-color:var(--gold);
    color:var(--gold);
    background:var(--gold-soft);
  }

  .option:disabled{
    cursor:default;
  }

  .option .opt-letter{
    color:var(--gold);
    font-weight:700;
    margin-right:8px;
  }

  /* ---------- calculating ---------- */
  .calc-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
  }

  .calc-number{
    font-family:'Cormorant Garamond', serif;
    font-size:88px;
    font-weight:700;
    color:var(--gold);
    line-height:1;
  }

  .calc-text{
    font-size:17px;
    color:var(--muted);
  }

  .spinner{
    width:34px;
    height:34px;
    border:3px solid #222;
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin 0.9s linear infinite;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- result ---------- */
  .result-wrap{
    animation:resultPop 0.5s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes resultPop{
    from{ opacity:0; transform:scale(0.85); }
    to{ opacity:1; transform:scale(1); }
  }

  .result-emoji{
    font-size:84px;
    margin-bottom:8px;
    display:inline-block;
  }

  .result-emoji.crown{
    animation:shine 1.8s ease-in-out infinite;
    filter:drop-shadow(0 0 12px rgba(201,168,76,0.6));
  }

  @keyframes shine{
    0%, 100%{ filter:drop-shadow(0 0 6px rgba(201,168,76,0.4)); transform:scale(1) rotate(-2deg); }
    50%{ filter:drop-shadow(0 0 22px rgba(201,168,76,0.9)); transform:scale(1.08) rotate(2deg); }
  }

  .result-title{
    font-family:'Cormorant Garamond', serif;
    font-size:32px;
    font-weight:700;
    color:var(--gold);
    margin:6px 0 18px;
    text-transform:lowercase;
  }

  .result-text{
    font-size:16.5px;
    line-height:1.7;
    color:var(--text);
    white-space:pre-line;
    margin-bottom:8px;
  }

  .result-score{
    font-size:13px;
    color:var(--muted);
    margin-bottom:30px;
    letter-spacing:0.5px;
  }

  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--gold);
    color:#0a0a0a;
    padding:12px 20px;
    border-radius:var(--radius);
    font-size:14px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:50;
    white-space:nowrap;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .footer-brand{
    margin-top:32px;
    font-size:12px;
    color:#555;
    letter-spacing:0.5px;
  }

  @media (max-width:360px){
    .welcome-title{ font-size:34px; }
    .q-text{ font-size:20px; }
    .calc-number{ font-size:68px; }
    .result-emoji{ font-size:68px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ЭКРАН 1: ПРИВЕТСТВИЕ -->
  <section class="screen active" id="screen-welcome">
    <div class="welcome-emoji">🖤</div>
    <h1 class="welcome-title">насколько ты гурман?</h1>
    <p class="welcome-sub">проверь себя — честно и без прикрас</p>
    <p class="welcome-meta">10 вопросов которые всё расскажут</p>
    <button class="btn btn-gold" id="btn-start">начать тест</button>
    <div class="footer-brand">эстетика столичной</div>
  </section>

  <!-- ЭКРАН 2: ВОПРОСЫ -->
  <section class="screen" id="screen-quiz">
    <div class="quiz-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label">1/10</div>
      <div class="q-number" id="q-number">вопрос 1</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>
  </section>

  <!-- ЭКРАН 3: ПОДСЧЁТ -->
  <section class="screen" id="screen-calc">
    <div class="calc-wrap">
      <div class="spinner"></div>
      <div class="calc-number" id="calc-number">0</div>
      <div class="calc-text">считаем твой гурманский уровень... 🖤</div>
    </div>
  </section>

  <!-- ЭКРАН 4: РЕЗУЛЬТАТ -->
  <section class="screen" id="screen-result">
    <div class="result-wrap">
      <div class="result-emoji" id="result-emoji"></div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-text" id="result-text"></p>
      <p class="result-score" id="result-score"></p>
    </div>
    <div class="btn-stack">
      <button class="btn btn-gold" id="btn-share">поделиться с подругой</button>
      <button class="btn btn-outline" id="btn-restart">пройти ещё раз</button>
      <button class="btn btn-gold" id="btn-subscribe">эстетика столичной 🖤</button>
    </div>
  </section>

</div>

<div class="toast" id="toast">скопировано в буфер обмена 🖤</div>

<script>
(function(){
  "use strict";

  var QUESTIONS = [
    {
      text: "ты в ресторане. официант принёс не то блюдо. ты:",
      options: [
        { t: "съем что принесли — неудобно говорить", v: 1 },
        { t: "вежливо попрошу заменить", v: 2 },
        { t: "позову менеджера — это недопустимо", v: 3 },
        { t: "сфотографирую и напишу обзор 😄", v: 4 }
      ]
    },
    {
      text: "тирамису в меню. ты:",
      options: [
        { t: "закажу — люблю тирамису", v: 1 },
        { t: "спрошу из чего делают маскарпоне", v: 2 },
        { t: "уже знаю где лучший тирамису в Москве", v: 3 },
        { t: "только если маскарпоне привезли из Италии", v: 4 }
      ]
    },
    {
      text: "как ты выбираешь ресторан:",
      options: [
        { t: "по советам друзей", v: 1 },
        { t: "по отзывам на картах", v: 2 },
        { t: "по атмосфере на фото", v: 3 },
        { t: "у меня уже есть свой список проверенных мест", v: 4 }
      ]
    },
    {
      text: "ты заказала пасту. она пришла переваренной. ты:",
      options: [
        { t: "съем — голодная", v: 1 },
        { t: "скажу официанту тихо", v: 2 },
        { t: "верну на кухню — альденте это не каприз", v: 3 },
        { t: "запомню и не вернусь сюда никогда", v: 4 }
      ]
    },
    {
      text: "идеальный вечер в ресторане для тебя:",
      options: [
        { t: "вкусная еда и хорошая компания", v: 1 },
        { t: "красивый интерьер и правильная музыка", v: 2 },
        { t: "безупречный сервис и атмосфера", v: 3 },
        { t: "всё вместе — иначе зачем идти", v: 4 }
      ]
    },
    {
      text: "винная карта в ресторане:",
      options: [
        { t: "возьму что посоветует официант", v: 1 },
        { t: "выберу что-то среднее по цене", v: 2 },
        { t: "изучу список и выберу сама", v: 3 },
        { t: "спрошу сомелье — у них должен быть сомелье", v: 4 }
      ]
    },
    {
      text: "ты видишь в меню незнакомое блюдо. ты:",
      options: [
        { t: "закажу что-то знакомое — не рискую", v: 1 },
        { t: "спрошу официанта что это", v: 2 },
        { t: "загуглю прямо за столом", v: 3 },
        { t: "закажу — именно за этим и хожу в рестораны", v: 4 }
      ]
    },
    {
      text: "счёт пришёл больше чем ожидала. ты:",
      options: [
        { t: "расстроюсь но заплачу", v: 1 },
        { t: "проверю позиции — вдруг ошибка", v: 2 },
        { t: "хороший ужин стоит своих денег", v: 3 },
        { t: "если всё было на уровне — не жалею ни рубля", v: 4 }
      ]
    },
    {
      text: "твой критерий хорошего ресторана:",
      options: [
        { t: "вкусно и недорого", v: 1 },
        { t: "красиво и атмосферно", v: 2 },
        { t: "качественные продукты и профессиональная кухня", v: 3 },
        { t: "когда хочется вернуться на следующий день", v: 4 }
      ]
    },
    {
      text: "после ужина в ресторане ты:",
      options: [
        { t: "просто иду домой", v: 1 },
        { t: "делаю фото и выкладываю сторис", v: 2 },
        { t: "записываю впечатления пока не забыла", v: 3 },
        { t: "уже думаю когда вернусь и что закажу в следующий раз", v: 4 }
      ]
    }
  ];

  var RESULTS = [
    {
      min: 10, max: 16,
      emoji: "🤷",
      title: "не особо притязательный",
      text: "ты не особо притязательный 🤷\nи знаешь что — это честно\nглавное что еда была\nостальное детали\nно попробуй однажды\nзаказать что-то незнакомое —\nвдруг понравится? 🖤"
    },
    {
      min: 17, max: 23,
      emoji: "🍕",
      title: "жорка-обжорка",
      text: "жорка-обжорка — и это комплимент 🍕\nты любишь поесть вкусно и много\nбез лишних церемоний\nрестораны для тебя про удовольствие\nа не про перформанс\nи в этом есть своя мудрость 🖤"
    },
    {
      min: 24, max: 30,
      emoji: "🍷",
      title: "ресторанный романтик",
      text: "ресторанный романтик 🍷\nты идёшь в ресторан за атмосферой\nза настроением за вечером\nеда важна но это не главное\nглавное — как ты себя чувствуешь\nкогда выходишь оттуда\nи ты умеешь это чувствовать 🖤"
    },
    {
      min: 31, max: 36,
      emoji: "😤",
      title: "капризный критик",
      text: "капризный критик 😤\nс тобой не соскучишься\nты знаешь чего хочешь\nи не стесняешься об этом говорить\nофицианты тебя побаиваются\nно шеф-повара уважают\nпотому что именно такие как ты\nдержат рестораны в тонусе 🖤"
    },
    {
      min: 37, max: 40,
      emoji: "👑",
      title: "столичный эстет",
      text: "столичный эстет 👑\nпоздравляю — ты настоящий гурман\nты замечаешь всё —\nот качества маскарпоне\nдо того как сложена салфетка\nрестораны для тебя не просто еда\nэто искусство, атмосфера и жизнь\nдобро пожаловать в клуб 🖤\nэстетика столичной приветствует своих 👑",
      crown: true
    }
  ];

  var TELEGRAM_LINK = "https://t.me/estetika_stolichnoy";
  var APP_LINK = window.location.href;

  var state = {
    current: 0,
    score: 0,
    answers: [],
    result: null
  };

  var screens = {
    welcome: document.getElementById("screen-welcome"),
    quiz: document.getElementById("screen-quiz"),
    calc: document.getElementById("screen-calc"),
    result: document.getElementById("screen-result")
  };

  function showScreen(name){
    var current = document.querySelector(".screen.active");
    var next = screens[name];
    if(current === next) return;
    if(current){
      current.classList.remove("active");
    }
    next.classList.add("active");
  }

  function resetQuiz(){
    state.current = 0;
    state.score = 0;
    state.answers = [];
    state.result = null;
    renderQuestion();
  }

  function renderQuestion(){
    var idx = state.current;
    var q = QUESTIONS[idx];
    var total = QUESTIONS.length;

    document.getElementById("progress-fill").style.width = ((idx) / total * 100) + "%";
    document.getElementById("progress-label").textContent = (idx + 1) + "/" + total;
    document.getElementById("q-number").textContent = "вопрос " + (idx + 1);
    document.getElementById("q-text").textContent = q.text;

    var letters = ["А", "Б", "В", "Г"];
    var optionsWrap = document.getElementById("options");
    optionsWrap.innerHTML = "";

    q.options.forEach(function(opt, i){
      var btn = document.createElement("button");
      btn.className = "option";
      btn.innerHTML = '<span class="opt-letter">' + letters[i] + ')</span>' + escapeHtml(opt.t);
      btn.addEventListener("click", function(){ selectOption(btn, opt); });
      optionsWrap.appendChild(btn);
    });
  }

  function escapeHtml(str){
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function selectOption(btn, opt){
    var optionsWrap = document.getElementById("options");
    var buttons = optionsWrap.querySelectorAll(".option");
    buttons.forEach(function(b){ b.disabled = true; });
    btn.classList.add("selected");

    state.score += opt.v;
    state.answers.push(opt.v);

    document.getElementById("progress-fill").style.width = ((state.current + 1) / QUESTIONS.length * 100) + "%";

    setTimeout(function(){
      state.current++;
      if(state.current < QUESTIONS.length){
        renderQuestion();
      } else {
        startCalculating();
      }
    }, 500);
  }

  function startCalculating(){
    showScreen("calc");
    var el = document.getElementById("calc-number");
    var target = state.score;
    var duration = 1600;
    var startTime = null;

    function step(ts){
      if(!startTime) startTime = ts;
      var progress = Math.min((ts - startTime) / duration, 1);
      var val = Math.floor(progress * target);
      el.textContent = val;
      if(progress < 1){
        requestAnimationFrame(step);
      } else {
        el.textContent = target;
      }
    }
    requestAnimationFrame(step);

    setTimeout(function(){
      showResult();
    }, 2000);
  }

  function getResult(score){
    for(var i = 0; i < RESULTS.length; i++){
      if(score >= RESULTS[i].min && score <= RESULTS[i].max){
        return RESULTS[i];
      }
    }
    return RESULTS[RESULTS.length - 1];
  }

  function showResult(){
    var r = getResult(state.score);
    state.result = r;

    var emojiEl = document.getElementById("result-emoji");
    emojiEl.textContent = r.emoji;
    emojiEl.className = "result-emoji" + (r.crown ? " crown" : "");

    document.getElementById("result-title").textContent = r.title;
    document.getElementById("result-text").textContent = r.text;
    document.getElementById("result-score").textContent = state.score + " из 40 баллов";

    showScreen("result");
  }

  function shareResult(){
    var r = state.result || getResult(state.score);
    var shareText = "я прошла тест на гурмана 🖤\nмоё звание: " + r.title + "\nузнай своё → " + APP_LINK + "\nот эстетики столичной 👑";

    if(navigator.share){
      navigator.share({
        title: "насколько ты гурман?",
        text: shareText
      }).catch(function(){});
    } else {
      copyToClipboard(shareText);
    }
  }

  function copyToClipboard(text){
    function fallback(){
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand("copy"); } catch(e){}
      document.body.removeChild(ta);
      showToast();
    }

    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(showToast).catch(fallback);
    } else {
      fallback();
    }
  }

  function showToast(){
    var toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(function(){
      toast.classList.remove("show");
    }, 2200);
  }

  document.getElementById("btn-start").addEventListener("click", function(){
    resetQuiz();
    showScreen("quiz");
  });

  document.getElementById("btn-share").addEventListener("click", shareResult);

  document.getElementById("btn-restart").addEventListener("click", function(){
